name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
      - run: cmake -S . -B build
      - run: cmake --build build --config Release
      - if: runner.os != 'Windows'
        working-directory: build
        run: ./main
      - if: runner.os == 'Windows'
        working-directory: build/Release
        run: ./main.exe
